# Nginx 配置 - MCP Server 反向代理
# 域名: mcp.jishics.com
# 端口: 443 (HTTPS) -> 3001 (本地)

server {
    listen 443 ssl http2;
    server_name mcp.jishics.com;

    ssl_certificate /etc/letsencrypt/live/mcp.jishics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.jishics.com/privkey.pem;

    # SSE 长连接优化
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name mcp.jishics.com;
    return 301 https://$server_name$request_uri;
}
