name: Bug Report
description: 报告一个 Bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: 描述
      description: 描述你遇到的问题
    validations:
      required: true
  - type: textarea
    attributes:
      label: 复现步骤
      description: 如何触发这个 Bug
    validations:
      required: true
  - type: textarea
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: input
    attributes:
      label: Node.js 版本
      placeholder: "例如: v22.0.0"
  - type: input
    attributes:
      label: 操作系统
      placeholder: "例如: Windows 11 / Ubuntu 22.04"
